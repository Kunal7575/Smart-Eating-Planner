<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Eating Planner</title>

  <!-- U of G required fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet"
  />

  <!-- U of G web components stylesheet (FULL PACKAGE) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@uoguelph/web-components@2/dist/uofg-web-components/uofg-web-components.css"
  />

  <!-- U of G web components (FULL PACKAGE) -->
  <script
    type="module"
    src="https://cdn.jsdelivr.net/npm/@uoguelph/web-components@2/dist/uofg-web-components/uofg-web-components.esm.js"
  ></script>

  <style>
    :root {
      --uog-color-black: #000;
      --uog-color-black-focus: #444;
      --uog-color-black-on-light: #000;
      --uog-color-black-contrast: #fff;

      --uog-color-white: #fff;
      --uog-color-white-contrast: #000;

      --uog-color-red: #e51937;
      --uog-color-red-focus: #b3142c;
      --uog-color-red-on-light: #dc1836;
      --uog-color-red-contrast: #fff;

      --uog-color-yellow: #ffc429;
      --uog-color-yellow-focus: #ffe299;
      --uog-color-yellow-on-dark: #ffc429;
      --uog-color-yellow-contrast: #000;

      --uog-color-blue: #187bb4;
      --uog-color-blue-focus: #135f8b;
      --uog-color-blue-on-light: #1775ab;
      --uog-color-blue-contrast: #fff;

      --uog-color-green: #318738;
      --uog-color-green-focus: #27682c;
      --uog-color-green-on-light: #2e7f35;
      --uog-color-green-contrast: #fff;

      --uog-color-grey-light-focus: #bfbfbf;
      --uog-color-grey-light-bg: #f5f5f5;
      --uog-color-grey-light-contrast: #000;

      --uog-color-grey-dark-bg: #222;
      --uog-color-grey-dark-contrast: #fff;

      --uog-color-body-copy: #555;
      --uog-color-body-copy-on-dark: #ccc;
      --uog-color-body-copy-on-light: #555;

      --uog-color-body-copy-bold: #333;
      --uog-color-body-copy-bold-on-dark: #e2e2e2;
      --uog-color-body-copy-bold-on-light: #333;

      --uog-color-body-copy-link: #187bb4;
      --uog-color-body-copy-link-on-dark: #1d93d7;
      --uog-color-body-copy-link-on-light: #166ea2;

      --color-error: var(--uog-color-red);
      --color-error-bg: color-mix(in srgb, var(--uog-color-red) 10%, var(--uog-color-white));
      --color-error-border: var(--uog-color-red-focus);

      --color-success: var(--uog-color-green-on-light);
      --color-success-bg: color-mix(in srgb, var(--uog-color-green) 10%, var(--uog-color-white));
      --color-success-border: var(--uog-color-green-focus);

      --color-warning: var(--uog-color-yellow);
      --color-warning-bg: var(--uog-color-yellow-focus);
      --color-warning-border: var(--uog-color-yellow);

      --color-info: var(--uog-color-blue);
      --color-info-bg: color-mix(in srgb, var(--uog-color-blue) 10%, var(--uog-color-white));
      --color-info-border: var(--uog-color-blue-focus);

      --color-required: var(--uog-color-red-focus);

      --bg: var(--uog-color-grey-light-bg);
      --card: var(--uog-color-white);
      --text: var(--uog-color-body-copy);
      --text-bold: var(--uog-color-body-copy-bold);
      --muted: var(--uog-color-body-copy);
      --border: var(--uog-color-grey-light-focus);
      --border-light: color-mix(in srgb, var(--uog-color-grey-light-focus) 50%, var(--uog-color-white));
      --focus-color: var(--uog-color-yellow-focus);

      --radius: 14px;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 6px 16px rgba(0, 0, 0, 0.12);
      --shadow-tooltip: 0 10px 28px rgba(0, 0, 0, 0.14);
      --shadow-button: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    html {
      font-size: 62.5%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      font-size: 1.6rem;
    }

    uofg-header,
    uofg-footer {
      display: block;
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 12px;
      z-index: 10000;
      padding: 10px 14px;
      background: var(--uog-color-black);
      color: var(--uog-color-white);
      border-radius: 8px;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 12px;
      outline: 3px solid var(--focus-color);
      outline-offset: 2px;
    }

    .site-main {
      position: relative;
      min-height: 100vh;
    }

    .site-main::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(245, 245, 245, 0.84), rgba(245, 245, 245, 0.94)),
        url("./background.png");
      background-size: cover;
      background-position: center;
      filter: blur(1px);
      transform: scale(1.04);
      z-index: 0;
      pointer-events: none;
    }

    .site-main::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.05));
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
    }
    .page {
      padding: 44px 0 40px;
    }

    .page-title {
      margin: 0 0 10px;
      font-family: "Bitter", serif;
      font-size: 4.8rem;
      line-height: 1.1;
      font-weight: 800;
      color: var(--text-bold);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 2.4rem;
      color: var(--text);
      font-size: 2rem;
      line-height: 1.45;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.2px;
      color: var(--text-bold);
    }

    label {
      display: block;
      margin: 1.4rem 0 0.6rem;
      font-weight: 700;
      font-size: 1.2rem;
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--text-bold);
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      font-size: 1.4rem;
      border-radius: 10px;
      font-family: "DM Sans", Arial, sans-serif;
      border: 1px solid var(--border);
      background: var(--uog-color-white);
      color: var(--text-bold);
      outline: none;
    }

    input:focus,
    select:focus {
      outline: 3px solid var(--focus-color);
      outline-offset: 2px;
      border-color: transparent;
    }

    .action-group {
      display: grid;
      gap: 1rem;
      margin-top: 1.6rem;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      font-size: 1.4rem;
      border-radius: 10px;
      font-family: "DM Sans", Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--uog-color-blue);
      color: var(--uog-color-blue-contrast);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .btn-primary:hover {
      background: var(--uog-color-blue-focus);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-secondary {
      background: var(--uog-color-grey-light-bg);
      color: var(--text-bold);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: var(--uog-color-grey-light-focus);
      transform: translateY(-1px);
    }

    .btn-secondary:active {
      transform: translateY(1px);
    }

    .btn:focus {
      outline: 3px solid var(--focus-color);
      outline-offset: 2px;
    }

    .summary {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--uog-color-blue);
      border-top: 0.6rem solid var(--uog-color-blue);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      overflow: hidden;
      margin-bottom: 1.8rem;
    }

    .summary-header {
      background: rgba(24, 123, 180, 0.12);
      padding: 1.4rem 1.6rem 1rem;
      border-bottom: 1px solid var(--uog-color-blue);
    }

    .summary-title {
      margin: 0;
      font-size: 2rem;
      font-family: "Bitter", serif;
      color: var(--text-bold);
    }

    .summary-body {
      padding: 1.6rem;
      font-size: 1.6rem;
      color: var(--text);
      line-height: 1.6;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 1.2rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border-light);
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: var(--text);
    }

    .summary-value {
      font-weight: 700;
      color: var(--uog-color-blue);
    }

    /* .layout {
      display: grid;
      grid-template-columns: 34rem 1fr;
      gap: 2.2rem;
      align-items: start;
    } */
    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }
    .grid-top {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 24px;
      margin-bottom: 24px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .day-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      border-top: 4px solid var(--uog-color-yellow);
    }

    .day-card h3 {
      margin-bottom: 1.2rem;
      font-size: 2.4rem;
      font-family: "Bitter", serif;
      color: var(--text-bold);
    }

    .meal-block {
      background: var(--uog-color-grey-light-bg);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .meal-block h4 {
      margin: 0 0 0.8rem;
      font-size: 1.7rem;
      font-family: "Bitter", serif;
      color: var(--text-bold);
    }

    .meal-name {
      font-weight: 700;
      margin-bottom: 0.6rem;
      font-size: 1.5rem;
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--text-bold);
    }

    .meta {
      font-size: 1.3rem;
      color: var(--text);
      line-height: 1.45;
      font-family: "DM Sans", Arial, sans-serif;
    }

    .grocery-card,
    .nutrition-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .grocery-card h3,
    .nutrition-card h3 {
      margin-bottom: 1.2rem;
      font-size: 2.2rem;
      font-family: "Bitter", serif;
      color: var(--text-bold);
    }

    .grocery-list {
      display: grid;
      gap: 0.8rem;
      max-height: 42rem;
      overflow-y: auto;
    }

    .grocery-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.8rem;
      font-size: 1.4rem;
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--text);
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .nutrition-box {
      background: var(--uog-color-grey-light-bg);
      border: 1px solid var(--border);
      border-left: 4px solid var(--uog-color-blue);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .nutrition-box strong {
      display: block;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .nutrition-box span {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-bold);
    }

    .grocery-item:nth-child(even) {
      background: rgba(0, 0, 0, 0.03);
    }

    .alert-note {
      border-radius: 1.2rem;
      padding: 1.4rem;
      margin-top: 1.2rem;
      font-size: 1.4rem;
      font-family: "DM Sans", Arial, sans-serif;
      border: 1px solid transparent;
    }

    .alert-title {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 1.5rem;
      color: inherit;
      font-weight: 700;
    }

    .alert-success {
      background: var(--color-success-bg);
      color: var(--uog-color-green);
      border-color: var(--color-success-border);
    }

    .alert-equal {
      background: var(--color-warning-bg);
      color: var(--uog-color-yellow-contrast);
      border-color: var(--color-warning-border);
    }

    .alert-danger {
      background: var(--color-error-bg);
      color: var(--uog-color-red);
      border-color: var(--color-error-border);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .uofg-back-to-top {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 999;
      display: flex;
      width: 48px;
      aspect-ratio: 1 / 1;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border: 1px solid var(--uog-color-white);
      border-radius: 999px;
      background: var(--uog-color-black);
      color: var(--uog-color-white);
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      transition: background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .uofg-back-to-top:hover {
      background: var(--uog-color-red);
      color: var(--uog-color-red-contrast);
      transform: translateY(-2px);
    }

    .uofg-back-to-top.show {
      visibility: visible;
      opacity: 1;
    }

    .uofg-back-to-top svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .grid-top {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 4rem;
      }

      .subtitle {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 36px 0 40px;
      }

      .page-title {
        font-size: 3.2rem;
      }

      .nutrition-grid {
        grid-template-columns: 1fr;
      }

      .uofg-back-to-top {
        right: 14px;
        bottom: 18px;
        width: 44px;
        padding: 7px;
      }

      .uofg-back-to-top svg {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  
  <uofg-header
    page-title="Student Planning Tools"
    page-url="#example"
  >
    <a href="https://costcalculator3.netlify.app/">
      Cost Calculator
    </a>
    <a href="/">
      Eating Plan
    </a>
  </uofg-header>

  <main class="site-main" id="main-content">
    <div class="page">
      <div class="container">
        <h1 class="page-title">Smart Eating Planner</h1>
        <p class="subtitle">
          Weekly planner with breakfast, lunch, dinner, grocery list, cost estimate, and nutrition summary.
        </p>

        <div class="layout">
          <aside class="card">
            <label for="budget">Weekly Budget ($)</label>
            <input type="number" id="budget" min="10" step="1" value="50" />

            <label for="goal">Goal</label>
            <select id="goal">
              <option value="balanced">Balanced Eating</option>
              <option value="highProtein">High Protein</option>
              <option value="weightLoss">Weight Loss</option>
              <option value="budget">Lowest Cost</option>
            </select>

            <label for="days">Number of Days</label>
            <select id="days">
              <option value="3">3</option>
              <option value="5">5</option>
              <option value="7" selected>7</option>
            </select>

            <label for="diet">Diet Preference</label>
            <select id="diet">
              <option value="all" selected>No Restriction</option>
              <option value="vegetarian">Vegetarian</option>
            </select>

            <label for="proteinTarget">Daily Protein Target (g)</label>
            <input type="number" id="proteinTarget" min="20" step="5" value="90" />

            <div class="action-group">
              <button type="button" class="btn btn-primary" id="generateBtn">Generate Weekly Plan</button>
              <button type="button" class="btn btn-secondary" id="downloadBtn">Download PDF Plan</button>
            </div>

            <div id="plannerNotes" class="alert-note" role="alert" aria-live="polite" hidden>
              <strong class="alert-title">Planner note</strong>
              <div id="plannerNotesText"></div>
            </div>
          </aside>

          <section>
            <div id="summary"></div>

            <div class="grid-top">
              <div class="grocery-card">
                <h3>Grocery List</h3>
                <div id="groceryList" class="grocery-list"></div>
              </div>

              <div class="nutrition-card">
                <h3>Nutrition Summary</h3>
                <div id="nutritionSummary" class="nutrition-grid"></div>
              </div>
            </div>

            <div id="daysGrid" class="days-grid"></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <uofg-footer></uofg-footer>

  <button id="scrollTopBtn" class="uofg-back-to-top" type="button" aria-label="Back to top">
    <span class="sr-only">Back to top</span>
    <svg aria-hidden="true" focusable="false" viewBox="0 0 512 512">
      <path fill="currentColor" d="M233.4 105.4c12.5-12.5 32.8-12.5 45.3 0l192 192c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L256 173.3 86.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l192-192z"></path>
    </svg>
  </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
